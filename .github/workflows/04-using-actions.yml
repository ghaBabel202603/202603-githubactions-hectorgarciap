name: 04 - Uso de actions
on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      - name: 'Node setup'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: 'Install dependencies'
        working-directory: my-app
        run: npm ci
      - name: 'Run Unit Tests'
        working-directory: my-app
        run: npm test
          
